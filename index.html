<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Forum OSIS MPK Kab. Sukabumi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-red {
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }
        
        .input-focus:focus {
            border-color: #DC2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
        
        .btn-hover {
            transition: all 0.3s ease;
        }
        
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(220, 38, 38, 0.3);
        }
        
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body class="min-h-screen gradient-red flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute w-64 h-64 -top-20 -left-20 bg-white/10 rounded-full"></div>
        <div class="absolute w-96 h-96 bottom-0 right-0 bg-white/5 rounded-full"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-md relative z-10">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-lg mb-3">
                <i class="fas fa-users text-2xl text-red-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Forum OSIS MPK</h1>
            <p class="text-red-100 text-sm">Kabupaten Sukabumi</p>
        </div>

        <!-- Login Form -->
        <div class="glass-effect rounded-2xl shadow-2xl p-6 md:p-8">
            <h2 class="text-xl font-bold text-gray-900 text-center mb-6">Login Sistem</h2>
            
            <form id="loginForm" class="space-y-4">
                
                <!-- Username/Email -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-user text-red-500 mr-2"></i>Username atau Email
                    </label>
                    <input type="text" id="loginInput" required 
                        class="input-focus w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none"
                        placeholder="Masukkan username atau email">
                    <p class="text-xs text-gray-500 mt-1">Bisa pakai username atau email</p>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-lock text-red-500 mr-2"></i>Password
                    </label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required 
                            class="input-focus w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none pr-10"
                            placeholder="Masukkan password">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn"
                    class="btn-hover w-full gradient-red text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 mt-6">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Masuk</span>
                </button>

                <div class="text-center text-sm text-gray-600 mt-4">
                    <p>Belum punya akun? <a href="daftar.html" class="text-red-600 font-semibold hover:underline">Daftar di sini</a></p>
                </div>
            </form>

            <!-- Loading State -->
            <div id="loadingState" class="hidden text-center py-8">
                <i class="fas fa-spinner fa-spin text-4xl text-red-600 mb-4"></i>
                <p class="text-gray-600">Memverifikasi data...</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-white/80 text-xs">
            <p>© 2024 Forum OSIS MPK Kabupaten Sukabumi</p>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 left-4 md:left-auto md:w-80 bg-white text-gray-800 px-4 py-3 rounded-xl shadow-2xl transform -translate-y-full opacity-0 transition-all duration-300 z-50 flex items-center gap-3 border-l-4 border-red-500 mx-auto md:mx-0">
        <i id="toastIcon" class="fas fa-exclamation-circle text-red-500 text-xl flex-shrink-0"></i>
        <span id="toastMessage" class="font-medium text-sm">Message</span>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, query, collection, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_APiU6azAWX5w5qANpInI-6QWX-IDzeA",
            authDomain: "web-absen-13c0f.firebaseapp.com",
            projectId: "web-absen-13c0f",
            storageBucket: "web-absen-13c0f.firebasestorage.app",
            messagingSenderId: "1026553673394",
            appId: "1:1026553673394:web:3bda1f7adb88615e727bab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.doc = doc;
        window.getDoc = getDoc;
        window.query = query;
        window.collection = collection;
        window.where = where;
        window.getDocs = getDocs;
    </script>

    <script>
        function togglePassword() {
            const field = document.getElementById('loginPassword');
            const icon = document.getElementById('eyeIcon');
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            msg.textContent = message;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-500 text-xl flex-shrink-0';
                toast.classList.replace('border-red-500', 'border-green-500');
            } else {
                icon.className = 'fas fa-exclamation-circle text-red-500 text-xl flex-shrink-0';
                toast.classList.replace('border-green-500', 'border-red-500');
            }
            
            toast.classList.remove('-translate-y-full', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('-translate-y-full', 'opacity-0');
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const input = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!input || !password) {
                showToast('Username/email dan password wajib diisi!');
                return;
            }
            
            // Show loading
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            
            try {
                let email = input;
                
                // Jika input bukan format email, cari email berdasarkan username
                if (!input.includes('@')) {
                    // Cari user berdasarkan username
                    const q = window.query(
                        window.collection(window.firebaseDb, 'users'),
                        window.where('username', '==', input)
                    );
                    
                    const querySnapshot = await window.getDocs(q);
                    
                    if (querySnapshot.empty) {
                        throw new Error('Username tidak ditemukan!');
                    }
                    
                    // Ambil email dari dokumen user
                    const userData = querySnapshot.docs[0].data();
                    email = userData.email;
                    
                    // Simpan role untuk dicek nanti
                    window.tempUserRole = userData.role;
                }
                
                // Login dengan Firebase Auth
                const userCredential = await window.signInWithEmailAndPassword(window.firebaseAuth, email, password);
                const uid = userCredential.user.uid;
                
                // Ambil data user dari Firestore untuk memastikan role
                const userDoc = await window.getDoc(window.doc(window.firebaseDb, 'users', uid));
                
                if (!userDoc.exists()) {
                    throw new Error('Data user tidak ditemukan di database!');
                }
                
                const userData = userDoc.data();
                const role = userData.role;
                
                // Verifikasi role yang benar
                console.log('Login berhasil!');
                console.log('User:', userData.nama);
                console.log('Role:', role);
                
                // Simpan data ke localStorage untuk session
                localStorage.setItem('userData', JSON.stringify({
                    uid: uid,
                    nama: userData.nama,
                    username: userData.username,
                    email: userData.email,
                    role: role,
                    ...userData
                }));
                
                showToast(`Login berhasil! Selamat datang ${userData.nama}`, 'success');
                
                // Redirect berdasarkan role (opsional)
                setTimeout(() => {
                    if (role === 'Admin') {
                        console.log('Redirect ke dashboard admin...');
                        // window.location.href = 'admin.html';
                    } else {
                        console.log('Redirect ke dashboard anggota...');
                        // window.location.href = 'anggota.html';
                    }
                }, 1500);
                
            } catch (error) {
                console.error('Error:', error);
                
                // Hide loading, show form
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
                
                let message = 'Terjadi kesalahan. Coba lagi.';
                
                if (error.message === 'Username tidak ditemukan!') {
                    message = 'Username tidak terdaftar!';
                } else if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    message = 'Email/username atau password salah!';
                } else if (error.code === 'auth/wrong-password') {
                    message = 'Password salah!';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'Terlalu banyak percobaan. Coba lagi nanti.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Format email tidak valid!';
                }
                
                showToast(message);
                
                // Shake effect
                document.getElementById('loginForm').classList.add('shake');
                setTimeout(() => document.getElementById('loginForm').classList.remove('shake'), 400);
            }
        });

        // Check if already logged in
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('userData');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                console.log('Sudah login sebagai:', userData.role);
                // Auto redirect atau tampilkan info
            }
        });

        window.togglePassword = togglePassword;
        window.showToast = showToast;
    </script>
</body>
</html>
